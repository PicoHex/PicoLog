name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  validate:
    name: Validate (${{ matrix.logical-target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Show logical target
      run: dotnet --info
    
    - name: Restore dependencies
      run: dotnet restore ./PicoLog.slnx -p:UseProjectReferences=true
    
    - name: Build
      run: dotnet build ./PicoLog.slnx --configuration Release --no-restore -p:UseProjectReferences=true
    
    - name: Validate code formatting
      if: matrix.logical-target == 'linux-x64'
      run: dotnet format ./PicoLog.slnx --verify-no-changes --no-restore
    
    - name: Run tests
      run: dotnet test --project ./tests/PicoLog.Tests/PicoLog.Tests.csproj --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true

  aot-validation:
    name: AOT Validation (${{ matrix.logical-target }})
    runs-on: ${{ matrix.runs-on }}
    needs: validate
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install Clang (Linux)
      if: startsWith(matrix.rid, 'linux-')
      run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

    - name: Validate AOT publish path
      run: dotnet publish samples/PicoLog.Sample/PicoLog.Sample.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained -p:UseProjectReferences=true
