name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SourceLink
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore ./Pico.Logging.slnx -p:UseProjectReferences=true
    
    - name: Build
      run: dotnet build ./Pico.Logging.slnx --configuration Release --no-restore -p:UseProjectReferences=true
    
    - name: Run tests
      run: dotnet test --solution ./Pico.Logging.slnx --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true

  validate-aot-sample:
    name: AOT Validation (${{ matrix.runtime }})
    runs-on: ${{ matrix.os }}
    needs: test
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          # Validate x64 architectures only for basic libraries
          # ARM64 validation requires native runners or cross-compilation toolchains
          - runtime: win-x64
            os: windows-latest
          - runtime: linux-x64  
            os: ubuntu-latest
          # ARM architectures (optional - commented out until proper toolchain setup)
          # - runtime: win-arm64
          #   os: windows-latest
          # - runtime: linux-arm64
          #   os: ubuntu-24.04-arm
          # - runtime: osx-arm64
          #   os: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install platform-specific SDK
      if: matrix.os == 'windows-latest'
      uses: seanmiddleditch/gha-setup-vsdevenv@master

    - name: Install Clang (Linux)
      if: startsWith(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
    
    - name: Install Xcode command line tools (macOS)
      if: matrix.os == 'macos-latest'
      run: xcode-select --install || true

    - name: Publish and validate sample
      shell: pwsh
      run: ./scripts/Validate-AotSample.ps1 -RuntimeIdentifier "${{ matrix.runtime }}"

  pack:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs:
    - test
    - validate-aot-sample
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore ./Pico.Logging.slnx
    
    - name: Build with version
      run: dotnet build ./Pico.Logging.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }} -p:UseProjectReferences=true
    
    - name: Pack all packable projects
      run: |
        # Clean output directory
        rm -rf ./nupkg
        mkdir -p ./nupkg
        
        # Define packing order to ensure dependencies are built first
        # 1. Pico.Logging.Abs (abstraction layer, no dependencies)
        # 2. Pico.Logging (depends on Abs)
        # 3. Pico.Logging.DI (depends on Pico.Logging and external Pico.DI)
        
        # Pack Pico.Logging.Abs first
        echo "Packing Pico.Logging.Abs..."
        dotnet pack ./src/Pico.Logging.Abs/Pico.Logging.Abs.csproj \
          --configuration Release \
          --output ./nupkg \
          -p:Version=${{ steps.version.outputs.VERSION }} \
          -p:UseProjectReferences=false
        
        # Pack Pico.Logging (depends on Pico.Logging.Abs)
        echo "Packing Pico.Logging..."
        dotnet pack ./src/Pico.Logging/Pico.Logging.csproj \
          --configuration Release \
          --output ./nupkg \
          -p:Version=${{ steps.version.outputs.VERSION }} \
          -p:UseProjectReferences=false \
          -p:RestoreAdditionalProjectSources=./nupkg
        
        # Pack Pico.Logging.DI (depends on Pico.Logging and external Pico.DI)
        echo "Packing Pico.Logging.DI..."
        dotnet pack ./src/Pico.Logging.DI/Pico.Logging.DI.csproj \
          --configuration Release \
          --output ./nupkg \
          -p:Version=${{ steps.version.outputs.VERSION }} \
          -p:UseProjectReferences=false \
          -p:RestoreAdditionalProjectSources=./nupkg
        
        # Verify all packages were created
        echo "Created packages:"
        ls -la ./nupkg/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nupkg
        path: |
          ./nupkg/*.nupkg
          ./nupkg/*.snupkg

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nupkg
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Publish to NuGet.org
      run: |
        for file in *.nupkg
        do
          if [[ $file != *.symbols.* ]] && [[ $file != *.snupkg ]]; then
            echo "Publishing $file"
            dotnet nuget push $file \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi
        done